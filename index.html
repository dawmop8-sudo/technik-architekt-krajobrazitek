<div class="app">
  <!-- Header -->
  <div class="header">
    <span class="header-leaf">🌿</span>
    <div class="ornament">— ❧ —</div>
    <h1>Księga Zieleni</h1>
    <div class="subtitle">Zagadki z architektury krajobrazu</div>
    <div class="ornament">— ❧ —</div>
  </div>

  <!-- HOME PAGE -->
  <div id="page-home" class="page active">
    <div class="section-title">Wybierz poziom trudności</div>
    <div class="difficulty-grid">
      <div class="diff-btn easy" onclick="selectDifficulty('easy')">
        <span class="diff-icon">🌱</span>
        <span class="diff-name">Łatwy</span>
        <span class="diff-desc">Pierwsze kiełki</span>
      </div>
      <div class="diff-btn medium" onclick="selectDifficulty('medium')">
        <span class="diff-icon">🌸</span>
        <span class="diff-name">Średni</span>
        <span class="diff-desc">Czas rozkwitu</span>
      </div>
      <div class="diff-btn hard" onclick="selectDifficulty('hard')">
        <span class="diff-icon">🌳</span>
        <span class="diff-name">Trudny</span>
        <span class="diff-desc">Wiedza eksperta</span>
      </div>
    </div>
    <div id="riddle-list-container"></div>
  </div>

  <!-- RIDDLE PAGE -->
  <div id="page-riddle" class="page">
    <button class="back-btn" onclick="goHome()">← Powrót</button>
    <div class="riddle-header">
      <div class="riddle-number" id="riddle-num-label"></div>
      <div id="difficulty-badge" class="difficulty-badge"></div>
    </div>

    <div class="riddle-box">
      <div class="riddle-text" id="riddle-text"></div>
    </div>

    <div class="answers-label">Wybierz odpowiedź</div>
    <div class="answers-grid" id="answers-grid"></div>

    <div class="hint-row">
      <button class="hint-btn" onclick="showHint()">🔍 Wskazówka</button>
    </div>
    <div class="hint-box" id="hint-box"></div>

    <div class="success-msg" id="success-msg">
      <div class="icon">🌿</div>
      <h3>Doskonale!</h3>
      <p id="success-text"></p>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">← Poprzednia</button>
      <span class="progress-text" id="progress-text"></span>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">Następna →</button>
    </div>
  </div>

  <!-- Bottom botanical strip -->
  <div class="bottom-strip">
    <svg viewBox="0 0 780 80" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">
      <g stroke="#7ab648" stroke-width="1" fill="none" opacity="0.35">

        <path d="M580,48 Q590,28 582,11"/>
        <path d="M680,42 Q690,22 682,5"/>
        <path d="M740,45 Q750,28 744,12"/>
      </g>
      <g fill="#7ab648" opacity="0.3">
        <ellipse cx="42" cy="18" rx="7" ry="4" transform="rotate(-35,42,18)"/>
        <ellipse cx="122" cy="8" rx="7" ry="4" transform="rotate(-25,122,8)"/>
        <ellipse cx="222" cy="15" rx="7" ry="4" transform="rotate(-30,222,15)"/>
        <ellipse cx="344" cy="12" rx="7" ry="4" transform="rotate(-40,344,12)"/>
        <ellipse cx="462" cy="5" rx="7" ry="4" transform="rotate(-20,462,5)"/>
        <ellipse cx="582" cy="11" rx="7" ry="4" transform="rotate(-30,582,11)"/>
        <ellipse cx="682" cy="5" rx="7" ry="4" transform="rotate(-25,682,5)"/>
        <ellipse cx="744" cy="12" rx="7" ry="4" transform="rotate(-35,744,12)"/>
      </g>
    </svg>
  </div>
</div>

<script src="riddles.js"></script>

</body>
</html>
